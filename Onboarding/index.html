function ContentBlock({ block }) {
  if (block.type === "body") {
    return <p style={{ fontSize: 15, lineHeight: 1.7, color: "#333", margin: "0 0 14px 0" }}>{block.text}</p>;
  }
  if (block.type === "subhead") {
    return <p style={{ fontSize: 13, fontWeight: 700, color: TEAL, textTransform: "uppercase", letterSpacing: 1, margin: "20px 0 8px 0" }}>{block.text}</p>;
  }
  if (block.type === "callout") {
    return (
      <div style={{ background: "#EEF7F7", borderLeft: `4px solid ${TEAL}`, padding: "14px 16px", borderRadius: "0 8px 8px 0", margin: "16px 0" }}>
        <p style={{ fontSize: 13, fontWeight: 700, color: TEAL, margin: "0 0 4px 0" }}>{block.label}</p>
        <p style={{ fontSize: 15, lineHeight: 1.65, color: "#333", margin: 0 }}>{block.text}</p>
      </div>
    );
  }
  if (block.type === "cards") {
    const cols = block.items.length <= 3 ? `repeat(${block.items.length}, 1fr)` : "1fr 1fr 1fr";
    return (
      <div style={{ display: "grid", gridTemplateColumns: cols, gap: 10, margin: "12px 0 16px 0" }}>
        {block.items.map((item, i) => (
          <div key={i} style={{ background: LIGHTGRAY, borderRadius: 8, padding: "12px 14px", border: "1px solid #DDE3E6" }}>
            <p style={{ fontSize: 13, fontWeight: 700, color: "#333", margin: "0 0 4px 0" }}>{item.title}</p>
            <p style={{ fontSize: 13, lineHeight: 1.55, color: "#555", margin: 0 }}>{item.desc}</p>
          </div>
        ))}
      </div>
    );
  }
  if (block.type === "tips") {
    return (
      <div style={{ margin: "12px 0 16px 0" }}>
        {block.items.map((tip, i) => (
          <div key={i} style={{ display: "flex", gap: 10, marginBottom: 8, alignItems: "flex-start" }}>
            <span style={{ color: TEAL, fontWeight: 700, fontSize: 15, flexShrink: 0, marginTop: 2 }}>→</span>
            <p style={{ fontSize: 15, lineHeight: 1.6, color: "#333", margin: 0 }}>{tip}</p>
          </div>
        ))}
      </div>
    );
  }
  return null;
}

function ChecklistSection({ items, checked, onToggle }) {
  const done = items.filter((_, i) => checked[i]).length;
  return (
    <div style={{ marginTop: 20, background: LIGHTGRAY, borderRadius: 10, padding: "16px 18px", border: "1px solid #DDE3E6" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <p style={{ fontSize: 13, fontWeight: 700, color: TEAL, textTransform: "uppercase", letterSpacing: 1, margin: 0 }}>Action Steps</p>
        <span style={{ fontSize: 12, color: done === items.length ? TEAL : "#999", fontWeight: 600 }}>{done}/{items.length} done</span>
      </div>
      {items.map((item, i) => (
        <div key={i} onClick={() => onToggle(i)}
          style={{ display: "flex", gap: 10, marginBottom: 8, alignItems: "flex-start", cursor: "pointer", padding: "6px 8px", borderRadius: 6, background: checked[i] ? "#E6F2F2" : "transparent", transition: "background 0.15s" }}>
          <div style={{ width: 18, height: 18, borderRadius: 4, border: `2px solid ${checked[i] ? TEAL : "#CCCCCC"}`, background: checked[i] ? TEAL : WHITE, flexShrink: 0, marginTop: 2, display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s" }}>
            {checked[i] && <span style={{ color: WHITE, fontSize: 11, fontWeight: 700 }}>✓</span>}
          </div>
          <p style={{ fontSize: 14, lineHeight: 1.55, color: checked[i] ? "#777" : "#333", margin: 0, textDecoration: checked[i] ? "line-through" : "none", transition: "all 0.15s" }}>{item}</p>
        </div>
      ))}
    </div>
  );
}

            <div>
              <p style={{ fontSize: 12, fontWeight: 700, color: TEAL, textTransform: "uppercase", letterSpacing: 1, margin: "0 0 2px 0" }}>{mod.title}</p>
              <h2 style={{ fontSize: 19, fontWeight: 800, color: "#1A2A2D", margin: 0 }}>{mod.subtitle}</h2>
            </div>
          </div>

          <div style={{ background: LIGHTGRAY, borderRadius: 8, padding: "12px 14px", marginBottom: 20, borderLeft: "4px solid #DDE3E6" }}>
            <p style={{ fontSize: 15, lineHeight: 1.6, color: "#444", fontStyle: "italic", margin: 0 }}>{mod.intro}</p>
          </div>

          <div>{mod.content.map((block, i) => <ContentBlock key={i} block={block} />)}</div>

          {mod.checklist.length > 0 && (
            <ChecklistSection items={mod.checklist} checked={checkState[current]} onToggle={(i) => toggleCheck(current, i)} />
          )}
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", gap: 12 }}>
          <button onClick={() => setCurrent((p) => Math.max(0, p - 1))} disabled={current === 0}
            style={{ flex: 1, padding: "13px 0", borderRadius: 10, border: "2px solid #DDE3E6", background: current === 0 ? LIGHTGRAY : WHITE, color: current === 0 ? "#BBBBBB" : "#333", fontWeight: 700, fontSize: 14, cursor: current === 0 ? "default" : "pointer", transition: "all 0.2s" }}>
            ← Previous
          </button>
          {current < modules.length - 1 ? (
            <button onClick={() => setCurrent((p) => Math.min(modules.length - 1, p + 1))}
              style={{ flex: 2, padding: "13px 0", borderRadius: 10, border: "none", background: TEAL, color: WHITE, fontWeight: 700, fontSize: 14, cursor: "pointer", transition: "all 0.2s" }}>
              Next: {modules[current + 1].subtitle} →
            </button>
          ) : (
            <div style={{ flex: 2, padding: "13px 16px", borderRadius: 10, background: "#E6F2F2", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <p style={{ color: TEAL, fontWeight: 800, fontSize: 14, margin: 0 }}>
                {totalChecked === totalItems ? "✓ Module complete. You are ready for day one." : `${totalItems - totalChecked} action steps remaining across this module.`}
              </p>
            </div>
          )}
        </div>

        <p style={{ textAlign: "center", fontSize: 12, color: "#AAAAAA", marginTop: 20 }}>
          The GroundWork Collective · Module 6 of 11 · Built for the way you think
        </p>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<Module6 />);
  </script>
</body>
</html>
