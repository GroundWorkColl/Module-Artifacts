function analyzeSituation(text) {
  const lower = text.toLowerCase();
  let toxicScore = 0, hardScore = 0, boundaryScore = 0, interpersonalScore = 0, systemicScore = 0;

  toxicSignals.forEach((s) => { if (lower.includes(s)) { toxicScore += 2; } });
  hardSignals.forEach((s) => { if (lower.includes(s)) { hardScore += 2; } });
  boundarySignals.forEach((s) => { if (lower.includes(s)) { boundaryScore += 1; } });
  interpersonalSignals.forEach((s) => { if (lower.includes(s)) { interpersonalScore += 1; } });
  systemicSignals.forEach((s) => { if (lower.includes(s)) { systemicScore += 1; } });

  const total = toxicScore + hardScore;
  let category;
  if (total === 0) { category = "grey"; }
  else {
    const toxicRatio = toxicScore / Math.max(total, 1);
    if (toxicRatio >= 0.65) category = "toxic";
    else if (toxicRatio <= 0.3) category = "hard";
    else category = "grey";
  }

  let situationType = "general";
  if (interpersonalScore >= 2 && systemicScore >= 2) situationType = "both";
  else if (systemicScore >= 2) situationType = "systemic";
  else if (interpersonalScore >= 1) situationType = "interpersonal";
  else if (boundaryScore >= 2) situationType = "boundary";

  return { category, toxicScore, hardScore, boundaryScore, situationType };
}

function SituationAnalyzer() {
  const [situation, setSituation] = useState("");
  const [result, setResult] = useState(null);
  const [activeSection, setActiveSection] = useState(null);

  const handleAnalyze = () => {
    if (situation.trim().length < 20) return;
    setResult(analyzeSituation(situation));
    setActiveSection(null);
  };

  const handleReset = () => { setSituation(""); setResult(null); setActiveSection(null); };

  if (!result) {
    return (
      <div style={{ fontFamily: "'Segoe UI', system-ui, sans-serif", maxWidth: 700, margin: "0 auto", padding: "24px 16px" }}>
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>🔍</div>
          <h1 style={{ color: NAVY, fontSize: 22, fontWeight: 700, margin: "0 0 6px 0" }}>Hard or Toxic? Situation Analyzer</h1>
          <p style={{ color: "#5A6B7B", fontSize: 14, margin: 0 }}>Module 9 · Cluster 3 · Navigating the Workplace</p>
        </div>
        <div style={{ background: WARMGRAY, borderRadius: 12, padding: 20, marginBottom: 24, borderLeft: `4px solid ${TEAL}` }}>
          <p style={{ color: NAVY, fontSize: 15, lineHeight: 1.7, margin: "0 0 10px 0" }}>Describe a specific workplace situation that is weighing on you. The more detail you include, the more targeted your analysis will be.</p>
          <p style={{ color: "#5A6B7B", fontSize: 13, lineHeight: 1.6, margin: 0 }}>This tool reads what you write and identifies patterns to help you understand whether the situation is hard (growth territory), toxic (harmful territory), or somewhere in the grey zone. Everything stays in this session. Nothing is stored or shared.</p>
        </div>
        <div style={{ marginBottom: 20 }}>
          <label style={{ display: "block", color: NAVY, fontSize: 15, fontWeight: 600, marginBottom: 10 }}>What is happening at work?</label>
          <textarea
            value={situation}
            onChange={(e) => setSituation(e.target.value)}
            placeholder={"Describe the situation in your own words. Include what happened, who was involved, how it made you feel, and how long it has been going on.\n\nExample: My team lead regularly assigns me the most tedious tasks and gives the interesting projects to others. When I asked about it, she said I needed to \"prove myself\" first, even though I have been here longer than the people getting better assignments. I am starting to dread coming to work and I cannot tell if I am overreacting or if this is actually unfair."}
            style={{ width: "100%", minHeight: 160, padding: 16, borderRadius: 10, border: "1px solid #D1D5DB", fontSize: 14, lineHeight: 1.7, color: NAVY, resize: "vertical", boxSizing: "border-box", fontFamily: "'Segoe UI', system-ui, sans-serif" }}
          />
          <p style={{ color: "#9CA3AF", fontSize: 12, margin: "6px 0 0 0" }}>
            {situation.length < 20 ? `Write at least 20 characters to analyze (${situation.length}/20)` : `${situation.length} characters`}
          </p>
        </div>
        <button onClick={handleAnalyze} disabled={situation.trim().length < 20} style={{ width: "100%", padding: "14px 24px", background: situation.trim().length >= 20 ? TEAL : "#B0BEC5", color: WHITE, border: "none", borderRadius: 8, fontSize: 15, fontWeight: 600, cursor: situation.trim().length >= 20 ? "pointer" : "default" }}>
          Analyze My Situation
        </button>
      </div>
    );
  }

  const cat = categoryContent[result.category];
  const isGrey = result.category === "grey";
  let solutions, greyData;
  if (isGrey) { greyData = solutionPaths.grey[result.situationType] || solutionPaths.grey.general; }
  else { const paths = solutionPaths[result.category]; solutions = paths[result.situationType] || paths.general; }

  const tabs = isGrey ? [
    { id: "signals", label: "Read the Signals", icon: "📡" },
    { id: "conversation", label: "Prepare the Conversation", icon: "💬" },
    { id: "control", label: "What You Can Control", icon: "🎯" },
    { id: "boundaries", label: "Hold Your Boundaries", icon: "🛡️" },
  ] : null;

  return (
    <div style={{ fontFamily: "'Segoe UI', system-ui, sans-serif", maxWidth: 700, margin: "0 auto", padding: "24px 16px" }}>
      <div style={{ textAlign: "center", marginBottom: 20 }}>
        <div style={{ fontSize: 40, marginBottom: 8 }}>{cat.icon}</div>
        <h2 style={{ color: cat.color, fontSize: 22, fontWeight: 700, margin: "0 0 4px 0" }}>{cat.title}</h2>
      </div>
      <div style={{ background: LIGHTGRAY, borderRadius: 10, padding: 16, marginBottom: 20 }}>
        <p style={{ color: "#5A6B7B", fontSize: 12, fontWeight: 600, margin: "0 0 6px 0", textTransform: "uppercase", letterSpacing: "0.5px" }}>Your situation</p>
        <p style={{ color: NAVY, fontSize: 14, lineHeight: 1.6, margin: 0, fontStyle: "italic" }}>"{situation}"</p>
      </div>
      <div style={{ background: WHITE, border: `2px solid ${cat.color}`, borderRadius: 12, padding: 20, marginBottom: 24 }}>
        <p style={{ color: NAVY, fontSize: 15, lineHeight: 1.7, margin: 0 }}>{cat.core}</p>
      </div>

      {isGrey && (
        <>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 20 }}>
            {tabs.map((tab) => (
              <button key={tab.id} onClick={() => setActiveSection(activeSection === tab.id ? null : tab.id)} style={{ padding: "10px 16px", background: activeSection === tab.id ? ORANGE : WHITE, color: activeSection === tab.id ? WHITE : NAVY, border: `1px solid ${activeSection === tab.id ? ORANGE : "#D1D5DB"}`, borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer", flex: "1 1 auto", minWidth: 140, textAlign: "center" }}>
                {tab.icon} {tab.label}
              </button>
            ))}
          </div>

          {activeSection === "signals" && greyData.signals && (
            <div style={{ marginBottom: 24 }}>
              <h3 style={{ color: ORANGE, fontSize: 15, fontWeight: 700, margin: "0 0 12px 0", paddingBottom: 8, borderBottom: `2px solid ${ORANGE}` }}>What the Signals Are Telling You</h3>
              <p style={{ color: NAVY, fontSize: 14, lineHeight: 1.6, margin: "0 0 16px 0" }}>Grey zone situations send mixed messages. Here is what to look for in your specific situation to determine which direction this is leaning.</p>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 12 }}>
                <SignalCard label="Signals it may be hard" items={greyData.signals.towardHard} color={TEAL} />
                <SignalCard label="Signals it may be toxic" items={greyData.signals.towardToxic} color={RED} />
              </div>
              <div style={{ background: WARMGRAY, borderRadius: 8, padding: 14, marginTop: 14, borderLeft: `3px solid ${ORANGE}` }}>
                <p style={{ color: NAVY, fontSize: 13, lineHeight: 1.6, margin: 0 }}>Track these signals over the next two weeks. Write down one observation each day. Patterns on paper are clearer than patterns in your head. If the toxic column fills faster, trust that data.</p>
              </div>
            </div>
          )}

          {activeSection === "conversation" && greyData.conversationPrep && (
            <div style={{ marginBottom: 24 }}>
              <h3 style={{ color: ORANGE, fontSize: 15, fontWeight: 700, margin: "0 0 12px 0", paddingBottom: 8, borderBottom: `2px solid ${ORANGE}` }}>{greyData.conversationPrep.title}</h3>
              <p style={{ color: NAVY, fontSize: 14, lineHeight: 1.6, margin: "0 0 16px 0" }}>Grey zone situations often require a conversation to get clarity. The way you approach that conversation matters.</p>
              {greyData.conversationPrep.steps.map((step, i) => (
                <div key={i} style={{ display: "flex", gap: 12, marginBottom: 12, background: WHITE, borderRadius: 10, padding: 14, border: "1px solid #E5E7EB" }}>
                  <div style={{ minWidth: 28, height: 28, borderRadius: "50%", background: ORANGE, color: WHITE, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, flexShrink: 0 }}>{i + 1}</div>
                  <div>
                    <p style={{ color: NAVY, fontSize: 14, fontWeight: 600, margin: "0 0 4px 0" }}>{step.label}</p>
                    <p style={{ color: NAVY, fontSize: 13, lineHeight: 1.6, margin: 0 }}>{step.detail}</p>
                  </div>
                </div>
              ))}
            </div>
          )}

          {activeSection === "control" && (
            <div style={{ marginBottom: 24 }}>
              <h3 style={{ color: ORANGE, fontSize: 15, fontWeight: 700, margin: "0 0 12px 0", paddingBottom: 8, borderBottom: `2px solid ${ORANGE}` }}>What Is in Your Control (and What Is Not)</h3>
              <p style={{ color: NAVY, fontSize: 14, lineHeight: 1.6, margin: "0 0 16px 0" }}>One of the fastest ways to reduce anxiety in a grey zone situation is to clearly separate what you can influence from what you cannot.</p>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 12 }}>
                <div style={{ flex: 1, minWidth: 260, background: "#F0FAF0", border: `1px solid ${TEAL}`, borderRadius: 10, padding: 16 }}>
                  <p style={{ color: TEAL, fontSize: 13, fontWeight: 700, margin: "0 0 10px 0", textTransform: "uppercase" }}>🎯 In your control</p>
                  {greyData.inYourControl.map((item, i) => (
                    <div key={i} style={{ display: "flex", gap: 8, marginBottom: 6 }}>
                      <span style={{ color: TEAL, fontSize: 14, flexShrink: 0 }}>✓</span>
                      <p style={{ color: NAVY, fontSize: 13, lineHeight: 1.5, margin: 0 }}>{item}</p>
                    </div>
                  ))}
                </div>
                <div style={{ flex: 1, minWidth: 260, background: "#FFF5F5", border: `1px solid ${RED}`, borderRadius: 10, padding: 16 }}>
                  <p style={{ color: RED, fontSize: 13, fontWeight: 700, margin: "0 0 10px 0", textTransform: "uppercase" }}>✋ Not in your control</p>
                  {greyData.notInYourControl.map((item, i) => (
                    <div key={i} style={{ display: "flex", gap: 8, marginBottom: 6 }}>
                      <span style={{ color: RED, fontSize: 14, flexShrink: 0 }}>✗</span>
                      <p style={{ color: NAVY, fontSize: 13, lineHeight: 1.5, margin: 0 }}>{item}</p>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{ background: WARMGRAY, borderRadius: 8, padding: 14, marginTop: 14, borderLeft: `3px solid ${ORANGE}` }}>
                <p style={{ color: NAVY, fontSize: 13, lineHeight: 1.6, margin: 0 }}>When your brain spirals on things in the right column, redirect it with this question: "What is one thing on the left side I can do in the next 24 hours?"</p>
              </div>
            </div>
          )}

          {activeSection === "boundaries" && greyData.boundaryStrategies && (
            <div style={{ marginBottom: 24 }}>
              <h3 style={{ color: ORANGE, fontSize: 15, fontWeight: 700, margin: "0 0 12px 0", paddingBottom: 8, borderBottom: `2px solid ${ORANGE}` }}>Boundaries to Hold Right Now</h3>
              <p style={{ color: NAVY, fontSize: 14, lineHeight: 1.6, margin: "0 0 16px 0" }}>In grey zone situations, boundaries serve two purposes. They protect your energy while you figure things out. They also test the environment.</p>
              {greyData.boundaryStrategies.map((b, i) => (
                <div key={i} style={{ background: WHITE, border: "1px solid #E5E7EB", borderRadius: 10, padding: 16, marginBottom: 12 }}>
                  <p style={{ color: ORANGE, fontSize: 14, fontWeight: 700, margin: "0 0 8px 0" }}>{b.boundary}</p>
                  <p style={{ color: NAVY, fontSize: 13, lineHeight: 1.6, margin: 0 }}>{b.how}</p>
                </div>
              ))}
              <div style={{ background: WARMGRAY, borderRadius: 8, padding: 14, marginTop: 14, borderLeft: `3px solid ${ORANGE}` }}>
                <p style={{ color: NAVY, fontSize: 13, lineHeight: 1.6, margin: 0 }}>Setting a boundary and having it respected is a sign the situation leans hard. Setting a boundary and facing pushback, guilt, or consequences is a sign it leans toxic.</p>
              </div>
            </div>
          )}
        </>
      )}

      {!isGrey && solutions && (
        <div style={{ marginBottom: 24 }}>
          <h3 style={{ color: NAVY, fontSize: 16, fontWeight: 700, margin: "0 0 14px 0" }}>Your Solution Path</h3>
          {solutions.map((s, i) => (
            <div key={i} style={{ display: "flex", gap: 12, marginBottom: 12, background: WHITE, borderRadius: 10, padding: 16, border: "1px solid #E5E7EB" }}>
              <div style={{ minWidth: 30, height: 30, borderRadius: "50%", background: cat.color, color: WHITE, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 700, flexShrink: 0 }}>{i + 1}</div>
              <div>
                <p style={{ color: NAVY, fontSize: 14, fontWeight: 600, margin: "0 0 4px 0" }}>{s.step}</p>
                <p style={{ color: NAVY, fontSize: 13, lineHeight: 1.6, margin: 0 }}>{s.detail}</p>
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={{ background: WARMGRAY, borderRadius: 10, padding: 18, marginBottom: 20, borderLeft: `4px solid ${TEAL}` }}>
        <p style={{ color: TEAL, fontSize: 13, fontWeight: 700, margin: "0 0 8px 0", textTransform: "uppercase", letterSpacing: "0.5px" }}>A note for the neurodivergent brain</p>
        <p style={{ color: NAVY, fontSize: 14, lineHeight: 1.7, margin: 0 }}>
          {result.category === "grey"
            ? "Your brain is going to want to resolve this ambiguity immediately. That is how neurodivergent pattern recognition works. It scans for certainty in uncertain territory. Resist the urge to force a conclusion. Give yourself permission to sit with \"I do not know yet\" while you gather more data."
            : result.category === "hard"
            ? "Your nervous system may be sending alarm signals even though the situation is not dangerous. That is not a malfunction. Neurodivergent brains process novelty and discomfort with higher intensity. The key is learning to notice the alarm without obeying it automatically."
            : "Toxic environments are disproportionately harmful to neurodivergent professionals because they weaponize the things you already work hardest to manage. If you are masking more, stimming less, losing sleep, or shutting down, those are not personal failures. They are your nervous system telling you the truth about where you are. Listen to it."}
        </p>
      </div>

      <button onClick={handleReset} style={{ width: "100%", padding: "14px 24px", background: NAVY, color: WHITE, border: "none", borderRadius: 8, fontSize: 15, fontWeight: 600, cursor: "pointer" }}>
        Analyze Another Situation
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SituationAnalyzer />);
  </script>
</body>
</html>
